name: Release

# Manual semantic version tags, not automated commit-driven versioning — a single-maintainer
# project doesn't get much from changesets/semantic-release's automation, and it'd mean
# adopting a commit message convention just to support tooling. You decide when to cut a
# release:
#
#   git tag v1.2.0
#   git push origin v1.2.0
#
# That push is the only thing that triggers this workflow.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          # GHCR image names must be lowercase; this repo's owner/name aren't guaranteed to be.
          ghcr_image="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_image="docker.io/wwwescape/videogametrackarr"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=$ghcr_image" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=$dockerhub_image" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.ghcr_image }}:latest
            ${{ steps.meta.outputs.dockerhub_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.dockerhub_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
