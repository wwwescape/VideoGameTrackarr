# Example reverse proxy in front of the app container, terminating TLS and forwarding
# everything to the container's published port (8000 by default — see docker-compose.yml).
# This is a reference, not something docker-compose.yml wires up automatically: copy it to
# your own Nginx host/container, fill in your domain and certificate paths, and point
# "proxy_pass" at wherever the app container is actually reachable from this Nginx.
#
# The app is one origin serving both the API and the built frontend from the same FastAPI
# process — there's deliberately nothing here to split traffic between separate
# frontend/backend upstreams.

server {
    listen 80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;

    # Service worker registration (see M9) must be served from the path it controls —
    # don't cache it, so updates roll out promptly instead of being stuck behind a stale
    # cached copy.
    location = /sw.js {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
